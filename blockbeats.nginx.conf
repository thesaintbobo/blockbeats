server {
    listen 4000;
    server_name _;

    root /home/linuxuser/Coding/BlockBeats/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy Solana RPC — browser requests get 403 direct, server IP works fine
    location /rpc {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type";
            return 204;
        }
        proxy_pass https://api.mainnet-beta.solana.com;
        proxy_http_version 1.1;
        proxy_set_header Host api.mainnet-beta.solana.com;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        add_header Access-Control-Allow-Origin *;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
